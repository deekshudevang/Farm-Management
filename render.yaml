services:
  - type: web
      name: agrismart-backend
      runtime: node
       plan: free
      rootDir: backend
       buildCommand: npm install --legacy-peer-deps && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
                          startCommand: npm start
                              envVars:
                                    - key: NODE_ENV
                                            value: production
                                                  - key: JWT_SECRET
                                                          generateValue: true
                                                                - key: CORS_ORIGIN
                                                                        value: "*"
                                                                        
